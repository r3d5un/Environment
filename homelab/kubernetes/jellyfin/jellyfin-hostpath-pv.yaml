apiVersion: v1
kind: PersistentVolume
metadata:
  name: jellyfin-hostpath-config
  app: jellyfin
spec:
  capacity:
    storage: 200Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  hostPath:
    path: /opt/jellyfin/config
    type: DirectoryOrCreate
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: jellyfin-hostpath-cache
  app: jellyfin
spec:
  capacity:
    storage: 200Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  hostPath:
    path: /var/cache/jellyfin
    type: DirectoryOrCreate
