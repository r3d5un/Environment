apiVersion: v1
kind: Service
metadata:
  name: forgejo-service
  namespace: forgejo
spec:
  type: NodePort
  selector:
    app: forgejo
  ports:
    - name: "http"
      nodePort: 31170
      port: 3000
      targetPort: 3000
    - name: "ssh"
      nodePort: 31160
      port: 22
      targetPort: 22
